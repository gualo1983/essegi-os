name: bluebuild
on:
  schedule:
    - cron:
        "42 07 * * *" # build at 06:00 UTC every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
        arch:
          - x86_64
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repo
        run: |
          git clone https://$TOKEN_REPO_PRIVATO@github.com/gualo1983/essegi-os-segreto.git private
        env:
          TOKEN_REPO_PRIVATO: ${{ secrets.TOKEN_REPO_PRIVATO }}

      - name: Inject private recipe and script
        run: |
          # Sovrascrive la recipe pubblica con quella privata
          cp private/modules/recipe.yml recipes/recipe.yml

          # Copia lo script CIE nella cartella corretta
          mkdir -p files/scripts
          cp private/modules/install-cie.sh files/scripts/install-cie.sh

          
      # the build is fully handled by the reusable github action
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          arch: ${{ matrix.arch }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true
