name: bluebuild
on:
  schedule:
    - cron:
        "42 07 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repo
        run: |
          git clone https://$TOKEN_REPO_PRIVATO@github.com/gualo1983/essegi-os-segreto.git private
        env:
          TOKEN_REPO_PRIVATO: ${{ secrets.TOKEN_REPO_PRIVATO }}

      - name: Inject private recipe and script
        run: |
          # Sovrascrive la recipe pubblica con quella privata
          cp private/modules/recipe.yml recipes/recipe.yml

          # Copia lo script CIE nella cartella corretta
          mkdir -p files/scripts
          cp private/modules/install-cie.sh files/scripts/install-cie.sh

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml          # ← IMPORTANTE: torna a recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
