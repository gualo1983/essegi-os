# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: essegi-os
description: Sistema minimale immutabile ideale per me.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - source: local
    type: module-pack
    path: modules/rpm.yml

  - source: local
    type: module-pack
    path: modules/flatpak.yml

  - source: local
    type: script
    scripts:
      - modules/install-cie.sh

  - type: signing
