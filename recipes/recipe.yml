# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: essegi-os
description: Sistema minimale immutabile ideale per me.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  # 1. Configurazione Repository RPM Fusion
  - type: rpmfusion

  # 2. Installazione Pacchetti (Il tuo Step 1 attuale)
  - type: dnf
    install:
      - git
      - podman-compose
      - rclone
      - scrcpy
      - keepassxc
      - snapper
      - snapper-rollback
      - btrfs-progs
      - nano
      - neovim
      - btop
      - fastfetch
      - gnome-shell-extension-manager
      - gnome-tweaks

  # 3. Rimozione Pacchetti (Commentata per il prossimo commit)
  # - type: dnf
  #   remove:
  #     - gnome-maps
  #     - gnome-tour
  #     - orca
  #     - rhythmbox
  #     - totem
  #     - gnome-boxes
  #     - evince
  #     - gnome-weather
  #     - gnome-contacts
  #     - gnome-clocks

  # 4. Installazione Flatpak (Commentata per il terzo commit)
