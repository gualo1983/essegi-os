# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: essegi-os
description: Sistema minimale immutabile ideale per me.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

repos:
  - rpmfusion-free
  - rpmfusion-nonfree

# Qui definiamo i pacchetti da installare
packages:
  - git
  - podman-compose
  - rclone
  - scrcpy
  - keepassxc
  - snapper
  - snapper-rollback
  - btrfs-progs
  - nano
  - neovim
  - btop
  - fastfetch
  - gnome-shell-extension-manager
  - gnome-tweaks

