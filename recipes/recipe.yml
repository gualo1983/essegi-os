# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: essegi-os
description: Sistema minimale immutabile ideale per me.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  # 1. Installazione Pacchetti
  - type: dnf
    install:
      packages:
        - git
        - podman-compose
        - rclone
        - scrcpy
        - keepassxc
        - snapper
        - snapper-rollback
        - btrfs-progs
        - nano
        - neovim
        - btop
        - fastfetch
        - gnome-shell-extension-manager
        - gnome-tweaks

  # 2. Rimozione Pacchetti (Commentata per il prossimo commit)
